server {
    listen 80;
    server_name _;

    # Root for React + HLS
    root /usr/share/nginx/html;
    index index.html index.htm;

    # -----------------------------
    # React SPA
    # -----------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -----------------------------
    # HLS streaming
    # Files are in: /usr/share/nginx/html/hls
    # -----------------------------
    location /hls/ {
        # Correct types for HLS
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                     ts;
        }

        # CORS (if you ever embed this player from another domain)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Origin, Accept, User-Agent" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

        # HLS should not be gzipped
        gzip off;

        # Playlist: do NOT cache aggressively
        location ~ \.m3u8$ {
            add_header Content-Type application/vnd.apple.mpegurl;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires -1;
        }

        # Segments: small cache window is fine
        location ~ \.ts$ {
            add_header Content-Type video/mp2t;
            add_header Cache-Control "public, max-age=10" always;
            expires 10s;
        }
    }

    # -----------------------------
    # Simple healthcheck
    # -----------------------------
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{ "status": "ok" }';
    }
}

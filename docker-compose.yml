version: "3.9"

services:
  web:
    container_name: baraka-tv-web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"          # host:container (change 8080 if you want)
    restart: unless-stopped
    volumes:
      # HLS output folder so ffmpeg (on host or another container) can write segments here
      - ./hls:/usr/share/nginx/html/hls:rw
    environment:
      # add anything your React build might read at build-time (VITE_*/REACT_APP_*)
      # VITE_API_BASE_URL: "http://localhost:5000"
      NODE_ENV: "production"

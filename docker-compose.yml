version: "3.9"

services:
  app:
    build: .
    container_name: baraka-tv-app
    devices:
      - "/dev/video2:/dev/video2"
    environment:
      VIDEO_DEVICE: "/dev/video2"
      PULSE_SOURCE: "alsa_input.usb-MACROSILICON_USB_Video-02.iec958-stereo"
      VIDEO_WIDTH: "1280"
      VIDEO_HEIGHT: "720"
      FRAMERATE: "25"
      VIDEO_BITRATE: "1500k"
      AUDIO_BITRATE: "96k"
      HLS_DIR: "/app/frontend/hls"

      # ⬇⬇ Keep internal Docker hostname + port
      REDIS_URL: "redis://redis:6379/0"

    volumes:
      - app_dist:/app/frontend
    depends_on:
      - redis

  nginx:
    image: nginx:1.26-alpine
    container_name: baraka-tv-nginx
    ports:
      - "8080:80"
    volumes:
      - app_dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  redis:
    image: redis:alpine
    container_name: baraka-tv-redis

    # ⬇⬇ CHANGE host port (left side) → now 6380
    ports:
      - "6380:6379"

    volumes:
      - redis_data:/data

volumes:
  app_dist:
  redis_data:

# -----------------------------
# Global Nginx Configuration
# Best performance for HLS + React SPA
# -----------------------------

user nginx;
worker_processes auto;          # Use all CPU cores

events {
    worker_connections 8192;    # High concurrency
    multi_accept on;            # Accept as many connections as possible
    use epoll;                  # Best for Linux
}

# -----------------------------
# HTTP Configuration
# -----------------------------
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    aio on;                     # Asynchronous I/O for streaming
    directio 8m;                # Read large files directly for TS segments
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 30;
    keepalive_requests 500;

    server_tokens off;

    # Disable gzip for HLS later, but keep for general files
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # -----------------------------
    # SERVER BLOCK
    # -----------------------------
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # -----------------------------
        # React SPA
        # -----------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }

        # -----------------------------
        # HLS Streaming
        # -----------------------------
        location /hls/ {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t                     ts;
            }

            # CORS for streaming
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Origin, Accept, User-Agent" always;
            add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;

            # No gzip for HLS
            gzip off;

            # Playlist: always fresh
            location ~ \.m3u8$ {
                add_header Content-Type application/vnd.apple.mpegurl;
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                expires -1;
            }

            # Segments: micro-cache OK
            location ~ \.ts$ {
                add_header Content-Type video/mp2t;
                add_header Cache-Control "public, max-age=10" always;
                expires 10s;
            }
        }

        # -----------------------------
        # Health Check
        # -----------------------------
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{ "status": "ok" }';
        }
    }
}
